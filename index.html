
<!DOCTYPE html>
<html>
<head>
  <title>MA7 FIX </title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: #fff;
    }

    /* 🔥 شريط علوي بسيط */
    .topbar {
      background: #111;
      padding: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #ff3b3b;
      letter-spacing: 2px;
    }

    /* 🔍 بحث */
    .search {
      text-align: center;
      margin: 15px;
    }

    .search input {
      width: 300px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      outline: none;
      background: #1a1a1a;
      color: white;
    }

    /* 🎮 الألعاب */
    .game {
      background: #151515;
      width: 320px;
      margin: 15px auto;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #222;
    }

    .download-btn {
  display: inline-block;
  background-color: red;
  color: white;
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 8px;
  text-decoration: none;
  margin-top: 10px;
  transition: 0.3s;
}

.download-btn:hover {
  background-color: darkred;
  transform: scale(1.05);
}

.download-btn {
  display: block;        /* مهم */
  margin: 10px auto;     /* هذا اللي بيوسّطه */
  background-color: red;
  color: white;
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 8px;
  text-decoration: none;
  text-align: center;
  width: fit-content;
}

.card {
  text-align: center;
}

    .game img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .game h3 {
      margin: 10px;
    }

    .btn {
      display: block;
      margin: 10px;
      padding: 10px;
      background: #ff3b3b;
      color: white;
      text-decoration: none;
      text-align: center;
      border-radius: 6px;
      font-weight: bold;
    }

    
.search-container {
    display: flex;
    justify-content: center; /* بالوسط */
    margin: 20px 0;
}

#searchInput {
    width: 500px;      /* كبر الحجم */
    padding: 15px;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

input {
    width: 100%;
}

.search-container {
    text-align: center;
}

#searchInput {
    display: inline-block;
    width: 500px;
}


#searchInput:focus {
    border-color: #007bff;
    box-shadow: 0 0 8px rgba(0,123,255,0.3);
}

    .btn:hover {
      background: #ff1f1f;
    }
  </style>
</head>

<div class="topbar">MA7 GAMES</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="ابحث عن لعبة...">
    <link rel="stylesheet" href="style.css">
</div>
